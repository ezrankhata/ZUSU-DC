<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZUSU Image Download Centre</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/jpeg" href="assets/logo.jpg" />
</head>
<body>

  <header>
    <div class="header-inner">
      <img class="header-logo" src="assets/logo.jpg" alt="ZUSU Logo" />
      <div class="header-text">
        <h1>ZUSU Image Download Centre</h1>
        <p>ZCAS University Student Union &nbsp;&middot;&nbsp; Aspire, Acquire, Prosper</p>
      </div>
      <div class="header-right">
        <span id="photo-count" class="photo-count"></span>
        <button class="btn-dl-all" id="btn-download-all">&#8659; Download All</button>
      </div>
    </div>
    <div class="gold-bar"></div>
  </header>

  <div class="toolbar">
    <input type="text" id="search" class="search-input" placeholder="Search photos..." />
  </div>

  <main>
    <div class="photo-grid" id="photo-grid"></div>
    <div id="no-results" class="no-results" style="display:none">No photos match your search.</div>
  </main>

  <div class="lightbox" id="lightbox">
    <div class="lb-backdrop" id="lb-backdrop"></div>
    <button class="lb-close" id="lb-close">&#10005;</button>
    <button class="lb-arrow lb-prev" id="lb-prev">&#10094;</button>
    <div class="lb-stage">
      <div class="lb-img-wrap">
        <div class="lb-spinner" id="lb-spinner"></div>
        <img id="lb-img" src="" alt="" />
      </div>
      <div class="lb-bar">
        <div class="lb-meta">
          <span class="lb-name" id="lb-name"></span>
          <span class="lb-counter" id="lb-counter"></span>
        </div>
        <a class="lb-dl-btn" id="lb-download" href="#" download>&#8659; Download Photo</a>
      </div>
    </div>
    <button class="lb-arrow lb-next" id="lb-next">&#10095;</button>
  </div>

  <div class="toast" id="toast"></div>

  <footer>
    <p>&copy; 2025 ZCAS University Student Union &nbsp;&middot;&nbsp; All photos remain the property of ZUSU</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
